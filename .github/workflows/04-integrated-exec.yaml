# CI de Nível 04 - Pipeline integrada ao build do código

# Nome da Pipeline
name: 'Execução Integrada'

# Gatilhos (Triggers) - Regras de Disparo
# Gatilho manual = workflow_dispatch

on:
    workflow_dispatch:

# Tarefas dentro da pipeline = jobs
jobs:
    # Nome da tarefa (job)
    inspection:
        # Maquina onde o job vai rodar
        runs-on: ubuntu-latest
        
        environment:
          name: github-pages
          url: ${{ steps.deployment.output.page.url }} 

        # Passos do job
        steps:
            # Clone do projeto
            - uses: actions/checkout@v4

            # Instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: latest

            # Instalação do yarn
            - name: Instalando yarn
              run: npm install -g yarn

            # Instalação das dependências
            - name: Instalando dependências
              run: yarn

            # Inspeção do Código
            - name: Inspecionando código
              run: yarn lint
    
    unit:
        runs-on: ubuntu-latest
        needs: [inspection]
        steps:
            # Clone do projeto
            - uses: actions/checkout@v4

            # Instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: latest

            # Instalação do yarn
            - name: Instalando yarn
              run: npm install -g yarn

            # Instalação das dependências
            - name: Instalando dependências
              run: yarn

            # Executar os testes unitários
            - name: Executando os testes unitários
              run: yarn run test

    mutation:
        runs-on: ubuntu-latest
        needs: [unit]
        steps:
            # Clone do projeto
            - uses: actions/checkout@v4

            # Instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: latest

            # Instalação do yarn
            - name: Instalando yarn
              run: npm install -g yarn

            # Instalação das dependências
            - name: Instalando dependências
              run: yarn

            # Executar os testes de mutação com Stryker
            - name: Executando os testes de mutação
              run: yarn run test:mutation

    e2e:
        runs-on: ubuntu-latest
        needs: [mutation]
            # Clone do projeto
            - uses: actions/checkout@v4

            # Instalação do node
            - uses: actions/setup-node@v4
              with:
                node-version: latest

            # Instalação do yarn
            - name: Instalando yarn
              run: npm install -g yarn

            # Instalação das dependências
            - name: Instalando dependências
              run: yarn

            # Instalação dos browsers do Playwright
            - name: Instalando browsers do Playwright
              run: yarn playwright install

            # Executar os testes e2e
            - name: Executando os testes E2E
              run: yarn run e2e

    pages:
        runs-on: ubuntu-latest
        permissions:
          contents: read
          pages: write
          id-token: write
        needs: [e2e]
        
            # Publica o relatório do Playwright no GitHub Pages
            - name: Configurando GitHub Pages
              uses: actions/configure-pages@v4

            - name: Enviando artefato para o Pages
              uses: actions/upload-pages-artifact@v3
              with:
                path: playwright-report

            - name: Publicando no gitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
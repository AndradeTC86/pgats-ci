# CI de Nível 04 - Pipeline integrada ao build do código

# Nome da Pipeline
name: 'N4 - Execução Integrada'

# Gatilhos (Triggers) - Regras de Disparo
# Gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

  push:
    branches:
      - main

# Tarefas dentro da pipeline = jobs
jobs:
  # Nome da tarefa (job)
  inspection:
    # Maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # Passos do job
    steps:
      # Clone do projeto
      - uses: actions/checkout@v4

      # Instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # Instalação do yarn
      - name: Instalando yarn
        run: npm install -g yarn

      # Instalação das dependências
      - name: Instalando dependências
        run: yarn

      # Inspeção do Código
      - name: Inspecionando código
        run: yarn lint

  unit:
    runs-on: ubuntu-latest
    needs: [inspection]

    steps:
      # Clone do projeto
      - uses: actions/checkout@v4

      # Instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # Instalação do yarn
      - name: Instalando yarn
        run: npm install -g yarn

      # Instalação das dependências
      - name: Instalando dependências
        run: yarn

      # Executar os testes unitários
      - name: Executando os testes unitários
        run: yarn run test

  mutation:
    runs-on: ubuntu-latest
    needs: [unit]

    steps:
      # Clone do projeto
      - uses: actions/checkout@v4

      # Instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # Instalação do yarn
      - name: Instalando yarn
        run: npm install -g yarn

      # Instalação das dependências
      - name: Instalando dependências
        run: yarn

      # Executar os testes de mutação com Stryker
      - name: Executando os testes de mutação
        run: yarn run test:mutation

  e2e:
    runs-on: ubuntu-latest
    needs: [inspection]

    steps:
      # Clone do projeto
      - uses: actions/checkout@v4

      # Instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: latest

      # Instalação do yarn
      - name: Instalando yarn
        run: npm install -g yarn

      # Instalação das dependências
      - name: Instalando dependências
        run: yarn

      # Instalação dos browsers do Playwright
      - name: Instalando browsers do Playwright
        run: yarn playwright install

      # Executar os testes e2e
      - name: Executando os testes E2E
        run: yarn run e2e

      - name: Salvando relatórios de testes
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          path: ./playwright-report
          name: Relatórios de Testes E2E

  deploy:
    runs-on: ubuntu-latest
    needs: [mutation, e2e]

    steps:
      - name: Simulação de Deploy
        run: echo 'Deploy sendo realizado...'
